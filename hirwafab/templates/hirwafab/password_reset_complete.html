{% extends 'hirwafab/base.html' %}

{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="container">
    <h1>Password Updated</h1>
    <div class="info-section" style="margin-top:24px;">
        <p style="font-size:14px; color:#374151;">
            Your password has been set. You can now log in with your new password.
        </p>
    </div>
    <a href="{% url 'hirwafab:login' %}" class="btn" style="margin-top:16px;">
        Go to Login
    </a>
</div>
{% endblock %}
